openapi: "3.0.0"
info:
  version: 1.0.0
  title: Swagger Petstore
servers:
  - url: http://petstore.swagger.io/v1
paths:
  /pet:
    get:
      summary: Get a pet
      operationId: getPet
      responses:
        '200':
          description: Successful response
          headers:
            X-Rate-Limit:
              required: true
              schema:
                type: integer
            X-Correlation-Id:
              required: false
              schema:
                type: string
components:
  schemas: {}
