openapi: "3.1.0"
info:
  title: "Webhook Test API"
  version: "1.0.0"
paths:
  /pets:
    get:
      summary: "List pets"
      responses:
        "200":
          description: "A list of pets"
webhooks:
  newPet:
    post:
      summary: "New pet created"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
      responses:
        "200":
          description: "OK"
components:
  schemas: {}
