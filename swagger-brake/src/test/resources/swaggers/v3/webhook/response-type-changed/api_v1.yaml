openapi: "3.1.0"
info:
  title: "Webhook Response Type Change Test API"
  version: "1.0.0"
paths:
  /pets:
    get:
      summary: "List pets"
      responses:
        "200":
          description: "A list of pets"
webhooks:
  petUpdated:
    post:
      summary: "Pet updated notification"
      responses:
        "200":
          description: "Notification response"
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
components:
  schemas: {}
